name: Build Exogenesis Multiplatform

on:
  push:
    branches: [ "master", "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Add d8 to PATH
      run: |
        D8_PATH=$(find $ANDROID_HOME/build-tools -name d8 | head -n 1)
        D8_DIR=$(dirname $D8_PATH)
        echo "$D8_DIR" >> $GITHUB_PATH

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Desktop and Android Jars
      # Menjalankan dua task sekaligus
      run: ./gradlew jar jarAndroid

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Exogenesis-Pack
        # Ini akan mengambil file Desktop.jar dan Android.jar
        path: build/libs/*.jar
